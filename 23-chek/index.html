<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1154212</title>
    <!-- Минимум Bootstrap для стилей -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <input type="text" 
                       id="wordInput" 
                       class="form-control form-control-lg" 
                       placeholder="Введите русское слово">
                <h1 id="translation" class="text-center mt-4">
                    перевод появится здесь
                </h1>
            </div>
        </div>
    </div>

    <script>
        // API ключ закодирован в base64
        const encodedKey = 'ZGljdC4xLjEuMjAyNjAxMjBUMTQxMjE5Wi45NjM4MDEwMzFjMDI2Njg3Ljg5Y2RjZTA2OTYyZmQ1ZDk0YjkzNzBhZTJiZTk5ZDk3YzNhMTBlNDM=';
        const API_KEY = atob(encodedKey);
        
        const wordInput = document.getElementById('wordInput');
        const translationElement = document.getElementById('translation');
        let timer;

        async function translateToEnglish(russianWord) {
            if (!russianWord.trim()) {
                translationElement.textContent = 'перевод появится здесь';
                return;
            }
            
            translationElement.textContent = 'Перевожу...';
            
            try {
                const url = `https://dictionary.yandex.net/api/v1/dicservice.json/lookup?key=${API_KEY}&lang=ru-en&text=${encodeURIComponent(russianWord.trim())}`;
                
                // Прямой запрос
                let response = await fetch(url);
                
                if (!response.ok) {
                    // Через прокси
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                    response = await fetch(proxyUrl);
                }
                
                const data = await response.json();
                
                if (data.def && data.def.length > 0) {
                    translationElement.textContent = data.def[0].tr[0].text || 'Перевод не найден';
                } else {
                    translationElement.textContent = 'Перевод не найден';
                }
                
            } catch (error) {
                translationElement.textContent = 'Ошибка перевода';
            }
        }
        
        wordInput.addEventListener('input', function() {
            clearTimeout(timer);
            timer = setTimeout(() => {
                translateToEnglish(this.value);
            }, 500);
        });
        
        window.addEventListener('load', function() {
            wordInput.focus();
        });
    </script>
</body>
</html>
