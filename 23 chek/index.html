<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1154212 - Переводчик</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid mt-5">
        <div class="row">
            <div class="col-2"></div>
            <div class="col-8">
                <div class="mb-3">
                    <input type="text" 
                           id="wordInput" 
                           class="form-control form-control-lg" 
                           placeholder="Введите русское слово">
                </div>
                <h1 id="translation" class="text-center mt-4 border p-3 bg-light rounded">
                    перевод появится здесь
                </h1>
            </div>
            <div class="col-2"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // API ключ закодирован в base64
        const encodedKey = 'ZGljdC4xLjEuMjAyNjAxMjBUMTQxMjE5Wi45NjM4MDEwMzFjMDI2Njg3Ljg5Y2RjZTA2OTYyZmQ1ZDk0YjkzNzBhZTJiZTk5ZDk3YzNhMTBlNDM=';
        const API_KEY = atob(encodedKey);
        
        const wordInput = document.getElementById('wordInput');
        const translationElement = document.getElementById('translation');
        let timer;

        async function translateToEnglish(russianWord) {
            if (!russianWord.trim()) {
                translationElement.textContent = 'перевод появится здесь';
                translationElement.className = 'text-center mt-4 border p-3 bg-light rounded';
                return;
            }
            
            if (!/^[а-яА-ЯёЁ\s-]+$/.test(russianWord)) {
                translationElement.textContent = 'Введите слово на русском языке';
                translationElement.className = 'text-center mt-4 border p-3 bg-light rounded text-danger';
                return;
            }
            
            translationElement.textContent = 'Перевожу...';
            translationElement.className = 'text-center mt-4 border p-3 bg-light rounded text-primary';
            
            try {
                const url = `https://dictionary.yandex.net/api/v1/dicservice.json/lookup?key=${API_KEY}&lang=ru-en&text=${encodeURIComponent(russianWord.trim())}`;
                
                // Пробуем прямой запрос (если CORS разрешен)
                const response = await fetch(url);
                
                if (!response.ok) {
                    // Если прямой запрос не работает, пробуем через прокси
                    throw new Error('Прямой запрос не удался, пробуем через прокси');
                }
                
                const data = await response.json();
                
                if (data.def && data.def.length > 0) {
                    const firstTranslation = data.def[0].tr[0];
                    translationElement.textContent = firstTranslation.text || 'Перевод не найден';
                    translationElement.className = 'text-center mt-4 border p-3 bg-light rounded text-success';
                } else {
                    translationElement.textContent = 'Перевод не найден';
                    translationElement.className = 'text-center mt-4 border p-3 bg-light rounded text-warning';
                }
                
            } catch (error) {
                console.log('Прямой запрос не работает, пробуем через прокси...');
                
                // Пробуем через прокси
                try {
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                    const proxyResponse = await fetch(proxyUrl);
                    
                    if (!proxyResponse.ok) {
                        throw new Error('Прокси не работает');
                    }
                    
                    const data = await proxyResponse.json();
                    
                    if (data.def && data.def.length > 0) {
                        const firstTranslation = data.def[0].tr[0];
                        translationElement.textContent = firstTranslation.text || 'Перевод не найден';
                        translationElement.className = 'text-center mt-4 border p-3 bg-light rounded text-success';
                    } else {
                        translationElement.textContent = 'Перевод не найден';
                        translationElement.className = 'text-center mt-4 border p-3 bg-light rounded text-warning';
                    }
                } catch (proxyError) {
                    console.error('Ошибка перевода:', proxyError);
                    translationElement.textContent = 'Ошибка перевода. Проверьте подключение.';
                    translationElement.className = 'text-center mt-4 border p-3 bg-light rounded text-danger';
                }
            }
        }
        
        wordInput.addEventListener('input', function() {
            clearTimeout(timer);
            timer = setTimeout(() => {
                translateToEnglish(this.value);
            }, 500);
        });
        
        window.addEventListener('load', function() {
            wordInput.focus();
        });
    </script>
</body>
</html>
